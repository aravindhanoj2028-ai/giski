<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Dashboard</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        color: white;
        min-height: 100vh;
        transition: 0.3s;
    }

    .dark {
        background: #121212;
    }

    .container {
        max-width: 900px;
        margin: auto;
        padding: 20px;
        text-align: center;
    }

    h1 {
        margin-bottom: 10px;
    }

    .clock {
        font-size: 30px;
        margin-bottom: 20px;
    }

    .toggle-btn {
        padding: 8px 15px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        background: #ff9800;
        color: white;
        margin-bottom: 20px;
    }

    .card {
        background: rgba(255,255,255,0.1);
        padding: 20px;
        border-radius: 15px;
        margin-top: 20px;
        backdrop-filter: blur(10px);
    }

    input {
        padding: 10px;
        width: 60%;
        border-radius: 8px;
        border: none;
        outline: none;
    }

    button {
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #00c6ff;
        color: white;
        cursor: pointer;
    }

    ul {
        list-style: none;
        margin-top: 15px;
    }

    li {
        background: rgba(255,255,255,0.2);
        margin: 10px 0;
        padding: 10px;
        border-radius: 10px;
        display: flex;
        justify-content: space-between;
    }

    .delete {
        background: red;
        padding: 5px 10px;
        border-radius: 5px;
        cursor: pointer;
    }

    .progress {
        height: 10px;
        background: #ddd;
        border-radius: 10px;
        margin-top: 15px;
    }

    .progress-bar {
        height: 100%;
        background: lime;
        width: 0%;
        border-radius: 10px;
        transition: 0.3s;
    }

    @media(max-width:600px) {
        input {
            width: 100%;
            margin-bottom: 10px;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1>✨ Smart Dashboard</h1>

    <div class="clock" id="clock"></div>

    <button class="toggle-btn" onclick="toggleTheme()">Toggle Dark Mode</button>

    <div class="card">
        <h2>📝 To-Do List</h2>
        <input type="text" id="taskInput" placeholder="Enter task...">
        <button onclick="addTask()">Add</button>

        <ul id="taskList"></ul>

        <div class="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>
</div>

<script>
    // CLOCK
    function updateClock() {
        const now = new Date();
        document.getElementById("clock").innerText =
            now.toLocaleTimeString();
    }
    setInterval(updateClock, 1000);

    // THEME
    function toggleTheme() {
        document.body.classList.toggle("dark");
    }

    // TASKS
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    function renderTasks() {
        const list = document.getElementById("taskList");
        list.innerHTML = "";

        tasks.forEach((task, index) => {
            let li = document.createElement("li");

            li.innerHTML = `
                ${task}
                <span class="delete" onclick="deleteTask(${index})">X</span>
            `;

            list.appendChild(li);
        });

        updateProgress();
        localStorage.setItem("tasks", JSON.stringify(tasks));
    }

    function addTask() {
        const input = document.getElementById("taskInput");
        if (input.value.trim() === "") return;

        tasks.push(input.value);
        input.value = "";
        renderTasks();
    }

    function deleteTask(index) {
        tasks.splice(index, 1);
        renderTasks();
    }

    function updateProgress() {
        const total = tasks.length;
        const progressBar = document.getElementById("progressBar");

        if (total === 0) {
            progressBar.style.width = "0%";
        } else {
            progressBar.style.width = (total * 10) + "%";
        }
    }

    renderTasks();
</script>

</body>
</html>
